<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zubale AI Analytics</title>
  <link rel="icon" href="https://zubale.com/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3B3FE6;
      --blue-dark: #2E32B8;
      --blue-light: #5A5EF0;
      --navy: #0D0F33;
      --navy-light: #1A1D4E;
      --pink: #E84EA3;
      --white: #FFFFFF;
      --gray-50: #F8F9FC;
      --gray-100: #F0F1F7;
      --gray-200: #E2E4EE;
      --gray-300: #C8CBE0;
      --gray-500: #7B7FA3;
      --gray-700: #3D4066;
      --gray-900: #1A1D3B;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      background: var(--blue);
      padding: 0 40px;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      padding-top: 12px;
      padding-bottom: 12px;
    }
    .topbar-brand { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .topbar-logo { font-weight: 900; font-size: 22px; color: var(--white); letter-spacing: -0.5px; }
    .topbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.3); }
    .topbar-subtitle { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); }

    .topbar-filters { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .topbar-filter-group { display: flex; align-items: center; gap: 6px; }
    .topbar-filter-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: rgba(255,255,255,0.55);
    }
    .topbar-filter-input {
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--white);
      background: rgba(255,255,255,0.12);
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .topbar-filter-input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.18); }
    .topbar-filter-input::placeholder { color: rgba(255,255,255,0.45); }
    select.topbar-filter-input { min-width: 160px; cursor: pointer; }
    select.topbar-filter-input option { color: var(--gray-900); background: var(--white); }
    input[type="date"].topbar-filter-input::-webkit-calendar-picker-indicator { filter: invert(1); }
    .topbar-filter-reset {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      padding: 5px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all .15s;
    }
    .topbar-filter-reset:hover { background: rgba(255,255,255,0.22); color: var(--white); }
    .topbar-filter-tag {
      font-size: 10px; font-weight: 700; color: var(--white);
      background: rgba(255,255,255,0.18); border-radius: 6px;
      padding: 3px 10px;
    }

    .tab-bar {
      background: var(--blue-dark);
      padding: 0 40px;
      display: flex;
      gap: 0;
    }
    .tab-btn {
      padding: 11px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      letter-spacing: 0.2px;
    }
    .tab-btn:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
    .tab-btn.active {
      color: var(--white);
      border-bottom-color: var(--white);
    }
    @media (max-width: 768px) { .tab-bar { padding: 0 20px; } .tab-btn { padding: 10px 16px; font-size: 12px; } }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .container { max-width: 1280px; margin: 0 auto; padding: 32px 40px 56px; }
    @media (max-width: 768px) {
      .topbar { padding-left: 20px; padding-right: 20px; }
      .container { padding: 20px 20px 40px; }
    }

    .section { margin-bottom: 40px; }
    .section-title {
      font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--blue); margin-bottom: 16px; padding-left: 4px;
    }
    .section-divider { border: none; border-top: 1px solid var(--gray-200); margin: 0 0 40px; }

    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 28px 32px;
    }
    .card-accent { border-left: 4px solid var(--blue); }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 520px) { .stat-row { grid-template-columns: 1fr; } }

    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-500); margin-bottom: 8px; }
    .stat-value { font-size: 36px; font-weight: 900; letter-spacing: -1.2px; line-height: 1; }
    .stat-sub { font-size: 13px; font-weight: 600; color: var(--gray-500); margin-top: 6px; }
    .stat-accent { color: var(--blue); }
    .stat-accent-pink { color: var(--pink); }
    .stat-bar { height: 8px; border-radius: 4px; background: var(--gray-100); margin-top: 12px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 4px; }

    .chart-wrap { position: relative; width: 100%; height: 300px; }
    canvas { width: 100% !important; height: 100% !important; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    .dev-stat-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
    .dev-stat-row + .dev-stat-row { border-top: 1px solid var(--gray-100); }
    .dev-stat-rank {
      width: 28px; height: 28px; border-radius: 50%; background: var(--gray-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--gray-500); flex-shrink: 0;
    }
    .dev-stat-rank.top { background: var(--blue); color: var(--white); }
    .dev-stat-name { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .dev-stat-bar-wrap { flex: 1; min-width: 60px; }
    .dev-stat-bar-bg { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
    .dev-stat-bar-fill { height: 100%; border-radius: 3px; background: var(--blue); }
    .dev-stat-val { font-size: 13px; font-weight: 700; color: var(--gray-700); width: 50px; text-align: right; flex-shrink: 0; }
    .dev-stat-model { font-size: 11px; color: var(--gray-500); font-weight: 500; }

    .usage-chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .usage-chart-title { font-size: 15px; font-weight: 700; color: var(--gray-900); }
    .usage-badge {
      font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      background: var(--gray-100); color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .deploy-period-btn, .lt-period-btn, .zen-period-btn {
      cursor: pointer; border: 1px solid var(--gray-200); transition: all .15s;
    }
    .deploy-period-btn:hover, .lt-period-btn:hover, .zen-period-btn:hover { background: var(--gray-200); }
    .deploy-period-btn.active, .lt-period-btn.active, .zen-period-btn.active { background: var(--blue); color: var(--white); border-color: var(--blue); }

    .tbl-wrap { overflow-x: auto; }
    .sort-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; font-family: 'Inter', sans-serif; }
    .sort-table th {
      position: sticky; top: 0; z-index: 2;
      background: var(--gray-50); color: var(--gray-500);
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      padding: 10px 14px; text-align: right; white-space: nowrap; cursor: pointer;
      border-bottom: 2px solid var(--gray-200); user-select: none; transition: color .15s;
    }
    .sort-table th:first-child { text-align: left; }
    .sort-table th:hover { color: var(--blue); }
    .sort-table th.sorted-asc, .sort-table th.sorted-desc { color: var(--blue); }
    .sort-table th .sort-arrow { font-size: 10px; margin-left: 4px; }
    .sort-table td {
      padding: 9px 14px; text-align: right; white-space: nowrap;
      border-bottom: 1px solid var(--gray-100); font-weight: 500; color: var(--gray-700);
      font-variant-numeric: tabular-nums;
    }
    .sort-table td:first-child { text-align: left; font-weight: 600; color: var(--gray-900); }
    .sort-table tr:hover td { background: var(--gray-50); }
    .sort-table .col-ai { color: var(--blue); }
    .sort-table .col-manual { color: var(--pink); }
    .sort-table .col-pct { font-weight: 700; }
    .sort-table tr { cursor: pointer; }
    .sort-table tr.active-row td { background: var(--gray-100); }
    .sort-table tr.active-row td:first-child { color: var(--blue); }
    .tbl-search {
      width: 280px; padding: 8px 14px; border: 1px solid var(--gray-200); border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 13px; outline: none; transition: border-color .15s;
    }
    .tbl-search:focus { border-color: var(--blue); }
    .dev-detail { margin-top: 16px; display: none; }
    .dev-detail.open { display: block; }
    .dev-detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .dev-detail-name { font-size: 17px; font-weight: 800; color: var(--gray-900); }
    .dev-detail-close {
      background: none; border: 1px solid var(--gray-200); border-radius: 8px;
      padding: 4px 14px; font-family: 'Inter', sans-serif; font-size: 12px;
      font-weight: 600; color: var(--gray-500); cursor: pointer; transition: all .15s;
    }
    .dev-detail-close:hover { border-color: var(--blue); color: var(--blue); }
    .dev-detail-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
    .dev-detail-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray-500); }
    .dev-detail-stat-val { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }

    /* --- Chat panel --- */
    .chat-fab {
      position: fixed; bottom: 28px; right: 28px; z-index: 1000;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--blue); color: var(--white); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(59,63,230,0.35);
      transition: transform .2s, box-shadow .2s;
      font-size: 24px;
    }
    .chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(59,63,230,0.45); }
    .chat-fab.open { background: var(--gray-700); }

    .chat-panel {
      position: fixed; bottom: 96px; right: 28px; z-index: 999;
      width: 420px; max-height: 560px;
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: 20px; box-shadow: 0 12px 48px rgba(0,0,0,0.12);
      display: none; flex-direction: column; overflow: hidden;
    }
    .chat-panel.open { display: flex; }
    @media (max-width: 520px) { .chat-panel { left: 12px; right: 12px; width: auto; bottom: 88px; } }

    .chat-header {
      padding: 16px 20px; border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; gap: 10px;
    }
    .chat-header-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue); }
    .chat-header-title { font-size: 14px; font-weight: 700; color: var(--gray-900); }
    .chat-header-sub { font-size: 11px; color: var(--gray-500); font-weight: 500; margin-left: auto; }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 200px; max-height: 380px;
    }
    .chat-msg {
      max-width: 88%; padding: 10px 14px; border-radius: 14px;
      font-size: 13px; line-height: 1.55; word-wrap: break-word;
    }
    .chat-msg-user {
      align-self: flex-end; background: var(--blue); color: var(--white);
      border-bottom-right-radius: 4px;
    }
    .chat-msg-ai {
      align-self: flex-start; background: var(--gray-100); color: var(--gray-900);
      border-bottom-left-radius: 4px;
    }
    .chat-msg-ai p { margin: 0 0 8px; }
    .chat-msg-ai p:last-child { margin-bottom: 0; }
    .chat-msg-ai strong { color: var(--blue); }
    .chat-msg-ai ul, .chat-msg-ai ol { margin: 4px 0 8px 18px; }
    .chat-msg-ai li { margin-bottom: 2px; }
    .chat-msg-ai code { background: var(--gray-200); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    .chat-typing {
      align-self: flex-start; color: var(--gray-500); font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .chat-typing-dots span {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--gray-300); animation: chatBounce 1.2s infinite;
    }
    .chat-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes chatBounce { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

    .chat-input-area {
      padding: 12px 16px; border-top: 1px solid var(--gray-100);
      display: flex; gap: 8px;
    }
    .chat-input {
      flex: 1; padding: 10px 14px; border: 1px solid var(--gray-200);
      border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 13px;
      outline: none; resize: none; min-height: 40px; max-height: 80px;
      transition: border-color .15s;
    }
    .chat-input:focus { border-color: var(--blue); }
    .chat-send {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--blue); color: var(--white); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; transition: background .15s;
    }
    .chat-send:hover { background: var(--blue-dark); }
    .chat-send:disabled { background: var(--gray-300); cursor: not-allowed; }
  </style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">zubale</div>
    <div class="topbar-sep"></div>
    <div class="topbar-subtitle">Engineering Metrics</div>
  </div>
  <div class="topbar-filters">
    <div class="topbar-filter-group">
      <label class="topbar-filter-label">From</label>
      <input type="date" id="fStart" class="topbar-filter-input">
    </div>
    <div class="topbar-filter-group">
      <label class="topbar-filter-label">To</label>
      <input type="date" id="fEnd" class="topbar-filter-input">
    </div>
    <div class="topbar-filter-group">
      <label class="topbar-filter-label">Developer</label>
      <select id="fDev" class="topbar-filter-input">
        <option value="">All Developers</option>
      </select>
    </div>
    <button class="topbar-filter-reset" id="fReset">Reset</button>
    <span class="topbar-filter-tag" id="fTag" style="display:none"></span>
  </div>
</nav>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="ai-first">AI Code Assistants</button>
  <button class="tab-btn" data-tab="deployments">Deployments</button>
  <button class="tab-btn" data-tab="leadtime">Lead Time</button>
  <button class="tab-btn" data-tab="zenith">Zenith</button>
</div>

<div class="tab-content active" id="tab-ai-first">
  <div class="container">
    <div class="section" id="sectionLoc"></div>
    <hr class="section-divider">
    <div class="section" id="sectionDev"></div>
    <hr class="section-divider">
    <div class="section" id="sectionUsage"></div>
    <hr class="section-divider">
    <div class="section" id="sectionTable"></div>
  </div>
</div>

<div class="tab-content" id="tab-deployments">
  <div class="container">
    <div class="section">
      <div class="section-title">Deployments</div>
      <div class="stat-row" id="deployStats"></div>
      <div class="card">
        <div class="usage-chart-header">
          <div class="usage-chart-title">Deployments</div>
          <div style="display:flex;gap:4px">
            <button class="usage-badge deploy-period-btn active" data-period="day">Day</button>
            <button class="usage-badge deploy-period-btn" data-period="week">Week</button>
            <button class="usage-badge deploy-period-btn" data-period="month">Month</button>
          </div>
        </div>
        <div class="chart-wrap" style="height:360px"><canvas id="chartDeploys"></canvas></div>
      </div>
    </div>
    <hr class="section-divider">
    <div class="section" id="sectionDeployDevs"></div>
    <hr class="section-divider">
    <div class="section" id="sectionDeployTable"></div>
  </div>
</div>

<div class="tab-content" id="tab-leadtime">
  <div class="container">
    <div class="section">
      <div class="section-title">PR Lead Time</div>
      <div class="stat-row" id="ltStats"></div>
      <div class="card">
        <div class="usage-chart-header">
          <div class="usage-chart-title">Lead Time Distribution</div>
          <div class="usage-badge">Hours</div>
        </div>
        <div class="chart-wrap" style="height:360px"><canvas id="chartLtDist"></canvas></div>
      </div>
    </div>
    <hr class="section-divider">
    <div class="section">
      <div class="card">
        <div class="usage-chart-header">
          <div class="usage-chart-title">Lead Time</div>
          <div style="display:flex;gap:4px">
            <button class="usage-badge lt-period-btn" data-period="day">Day</button>
            <button class="usage-badge lt-period-btn active" data-period="week">Week</button>
            <button class="usage-badge lt-period-btn" data-period="month">Month</button>
          </div>
        </div>
        <div class="chart-wrap" style="height:360px"><canvas id="chartLtTime"></canvas></div>
      </div>
    </div>
    <hr class="section-divider">
    <div class="section" id="sectionLtDevs"></div>
  </div>
</div>

<div class="tab-content" id="tab-zenith">
  <div class="container">
    <div class="section">
      <div class="section-title">Zenith Adoption</div>
      <div class="stat-row" id="zenithStats"></div>
      <div class="card">
        <div class="usage-chart-header">
          <div class="usage-chart-title">Zenith vs Legacy</div>
          <div style="display:flex;gap:4px">
            <button class="usage-badge zen-period-btn" data-period="day">Day</button>
            <button class="usage-badge zen-period-btn active" data-period="week">Week</button>
            <button class="usage-badge zen-period-btn" data-period="month">Month</button>
          </div>
        </div>
        <div class="chart-wrap" style="height:360px"><canvas id="chartZenith"></canvas></div>
      </div>
    </div>
    <hr class="section-divider">
    <div class="section" id="sectionZenithDevs"></div>
  </div>
</div>

<!-- Chat panel -->
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-dot"></div>
    <div class="chat-header-title">AI Insights</div>
    <div class="chat-header-sub">Powered by Gemini</div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg chat-msg-ai">Ask me anything about your team's AI adoption, code metrics, or developer performance.</div>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chatInput" placeholder="Ask about your data..." rows="1"></textarea>
    <button class="chat-send" id="chatSend" title="Send">&#9654;</button>
  </div>
</div>
<button class="chat-fab" id="chatFab" title="AI Insights">&#9733;</button>

<script src="data/cursor_usage.js"></script>
<script src="data/guardian_deploys.js"></script>
<script>
(function() {
  // ===== UTILITIES =====
  function fmtNum(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
    return n.toString();
  }
  function fmtDate(s) {
    return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function linReg(arr) {
    const n = arr.length; if (n < 2) return arr.slice();
    const xm = (n - 1) / 2, ym = arr.reduce((a, v) => a + v, 0) / n;
    let num = 0, den = 0;
    for (let i = 0; i < n; i++) { num += (i - xm) * (arr[i] - ym); den += (i - xm) * (i - xm); }
    const s = den ? num / den : 0, b = ym - s * xm;
    return arr.map((_, i) => +(b + s * i).toFixed(1));
  }

  // ===== AGGREGATION (from compact R rows) =====
  function aggregateDaily(rows) {
    const daily = {};
    rows.forEach(r => {
      const day = r.d;
      if (!daily[day]) daily[day] = {
        date: day, totalLinesAdded: 0, totalLinesDeleted: 0,
        aiLinesAdded: 0, aiLinesDeleted: 0,
        nonAiLinesAdded: 0, nonAiLinesDeleted: 0,
        totalTabsShown: 0, totalTabsAccepted: 0,
        totalApplies: 0, totalAccepts: 0,
        agentRequests: 0, chatRequests: 0,
        _users: new Set(),
      };
      const d = daily[day];
      d.totalLinesAdded += r.la; d.totalLinesDeleted += r.ld;
      d.aiLinesAdded += r.aa; d.aiLinesDeleted += r.ad;
      d.totalTabsShown += r.ts; d.totalTabsAccepted += r.ta;
      d.totalApplies += r.ap; d.totalAccepts += r.ac;
      d.agentRequests += r.ar; d.chatRequests += r.cr;
      if (r.x) d._users.add(r.e);
    });
    return Object.keys(daily).sort().map(day => {
      const d = daily[day];
      d.nonAiLinesAdded = Math.max(0, d.totalLinesAdded - d.aiLinesAdded);
      d.nonAiLinesDeleted = Math.max(0, d.totalLinesDeleted - d.aiLinesDeleted);
      d.uniqueUsers = d._users.size;
      delete d._users;
      return d;
    });
  }

  function aggregateLeaderboard(rows) {
    const users = {};
    rows.forEach(r => {
      if (!r.e) return;
      if (!users[r.e]) users[r.e] = {
        email: r.e, totalLinesAdded: 0, totalLinesDeleted: 0,
        aiLinesAdded: 0, aiLinesDeleted: 0,
        totalTabsAccepted: 0, totalTabsShown: 0,
        totalApplies: 0, totalAccepts: 0,
        agentRequests: 0, chatRequests: 0,
        activeDays: 0, _models: {},
      };
      const u = users[r.e];
      u.totalLinesAdded += r.la; u.totalLinesDeleted += r.ld;
      u.aiLinesAdded += r.aa; u.aiLinesDeleted += r.ad;
      u.totalTabsShown += r.ts; u.totalTabsAccepted += r.ta;
      u.totalApplies += r.ap; u.totalAccepts += r.ac;
      u.agentRequests += r.ar; u.chatRequests += r.cr;
      if (r.x) u.activeDays++;
      if (r.m && r.m !== 'default') u._models[r.m] = (u._models[r.m] || 0) + 1;
    });
    const result = [];
    Object.values(users).forEach(u => {
      const total = u.totalLinesAdded + u.totalLinesDeleted;
      const ai = u.aiLinesAdded + u.aiLinesDeleted;
      const models = u._models; delete u._models;
      const keys = Object.keys(models);
      u.favoriteModel = keys.length ? keys.reduce((a, b) => models[a] >= models[b] ? a : b) : '';
      u.name = u.email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      u.aiShare = total > 0 ? Math.round(ai / total * 1000) / 10 : 0;
      if (u.activeDays > 0) result.push(u);
    });
    result.sort((a, b) => (b.aiLinesAdded + b.aiLinesDeleted) - (a.aiLinesAdded + a.aiLinesDeleted));
    result.forEach((u, i) => u.rank = i + 1);
    return result;
  }

  function aggregateUserMonthly(rows) {
    const buckets = {};
    rows.forEach(r => {
      if (!r.e || r.d.length < 7) return;
      const month = r.d.slice(0, 7);
      const key = r.e + '|' + month;
      if (!buckets[key]) buckets[key] = { e: r.e, month, la: 0, ld: 0, aa: 0, ad: 0, ar: 0, cr: 0 };
      const b = buckets[key];
      b.la += r.la; b.ld += r.ld; b.aa += r.aa; b.ad += r.ad; b.ar += r.ar; b.cr += r.cr;
    });
    const result = {};
    Object.values(buckets).sort((a, b) => a.month.localeCompare(b.month)).forEach(b => {
      const name = b.e.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      if (!result[name]) result[name] = [];
      const total = b.la + b.ld, ai = b.aa + b.ad;
      result[name].push({
        month: b.month, totalLines: total, aiLines: ai,
        manualLines: total - ai,
        aiShare: total > 0 ? Math.round(ai / total * 1000) / 10 : 0,
        agentRequests: b.ar, chatRequests: b.cr,
      });
    });
    return result;
  }

  // ===== CHART CONSTANTS =====
  const BLUE = '#3B3FE6', BLUE_A = 'rgba(59,63,230,0.2)';
  const PINK = '#E84EA3', PINK_A = 'rgba(232,78,163,0.15)';

      interaction: { mode: 'index', intersect: false },

        legend: { labels: { color: TICK, font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 14 } },

  // ===== CHART INSTANCE TRACKER =====
  const charts = {};

  // ===== FILTER STATE =====

  const globalStart = allDays[0];

  let filterStart = defaultStart;
  let filterEnd = globalEnd;
  let filterDev = '';

  const devSelect = document.getElementById('fDev');

      const opt = document.createElement('option');
      opt.value = o.value;
      opt.textContent = o.label;

  populateDevDropdown(aiDevOptions, 'All Developers');

  document.getElementById('fStart').value = defaultStart;
  document.getElementById('fEnd').value = globalEnd;

  // ===== RENDER FUNCTIONS =====
  function renderAll() {
    let filtered = R;
    if (filterStart) filtered = filtered.filter(r => r.d >= filterStart);
    if (filterEnd) filtered = filtered.filter(r => r.d <= filterEnd);
    if (filterDev) filtered = filtered.filter(r => r.e === filterDev);

    const data = aggregateDaily(filtered);
    const leaderboard = aggregateLeaderboard(filtered);
    const userMonthly = aggregateUserMonthly(filtered);

    if (data.length === 0) {
      ['sectionLoc', 'sectionDev', 'sectionUsage', 'sectionTable'].forEach(id =>
        document.getElementById(id).innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--gray-500)">No data for selected filters</div>'
      );
      return;
    }

    const dates = data.map(d => d.date);
    const isFiltered = filterStart !== globalStart || filterEnd !== globalEnd || filterDev;

    const tag = document.getElementById('fTag');
    if (isFiltered) {
      const parts = [];
      if (filterDev) parts.push(emailToName[filterDev]);
      if (filterStart !== globalStart || filterEnd !== globalEnd) parts.push(`${filterStart} → ${filterEnd}`);
      tag.textContent = parts.join(' · ');
      tag.style.display = '';
    } else { tag.style.display = 'none'; }

    renderSection1(data, dates);
    renderSection2(data, dates, leaderboard);
    renderSection3(data, dates);
    renderSection4(leaderboard, userMonthly);
  }

  // ----- Section 3: AI Usage -----
  function renderSection3(data, dates) {
    const sum = k => data.reduce((a, d) => a + (d[k] || 0), 0);
    const totalAdded = sum('totalLinesAdded'), totalDeleted = sum('totalLinesDeleted');
    const aiAdded = sum('aiLinesAdded'), aiDeleted = sum('aiLinesDeleted');

  function mdToHtml(md) {
    return md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/^\* (.+)$/gm, '<li>$1</li>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^/, '<p>').replace(/$/, '</p>')
      .replace(/<p><\/p>/g, '')
      .replace(/<p>(<ul>)/g, '$1').replace(/(<\/ul>)<\/p>/g, '$1');
  }

  async function sendMessage() {

    chatMessages.appendChild(typing);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, context: buildContext() }),
      });
      const result = await resp.json();
      typing.remove();
      const aiMsg = document.createElement('div');
      aiMsg.className = 'chat-msg chat-msg-ai';
      aiMsg.innerHTML = result.error ? `<em>Error: ${result.error}</em>` : mdToHtml(result.answer);

      errMsg.innerHTML = `<em>Connection error. Make sure the server is running (python server.py).</em>`;

    chatSend.disabled = false;
    chatMessages.scrollTop = chatMessages.scrollHeight;
    chatInput.focus();

  let deployPeriod = 'day';

  function getWeekStart(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(d.setDate(diff));
    return monday.toISOString().slice(0, 10);
  }

  function currentPeriodKey(period) {
    const today = new Date().toISOString().slice(0, 10);
    if (period === 'day') return today;
    if (period === 'week') return getWeekStart(today);
    return today.slice(0, 7);
  }

  function filterDeploys() {
    let filtered = DEPLOYS;
    if (filterStart) filtered = filtered.filter(d => (d.merge_date || d.inserted_at).slice(0, 10) >= filterStart);
    if (filterEnd) filtered = filtered.filter(d => (d.merge_date || d.inserted_at).slice(0, 10) <= filterEnd);
    if (filterDev) filtered = filtered.filter(d => d.pull_request_owner === filterDev);
    return filtered;
  }

  function aggregateDeploysByPeriod(deploys, period) {
    const buckets = {};
    deploys.forEach(dep => {
      const raw = dep.merge_date || dep.inserted_at;
      if (!raw) return;
      const dateStr = raw.slice(0, 10);
      let key;
      if (period === 'day') key = dateStr;
      else if (period === 'week') key = getWeekStart(dateStr);
      else key = dateStr.slice(0, 7);

      if (!buckets[key]) buckets[key] = { total: 0 };
      buckets[key].total++;
    });
    return Object.keys(buckets).sort().map(k => ({ period: k, ...buckets[k] }));
  }

  function aggregateDeployLeaderboard(deploys) {
    const devs = {};
    deploys.forEach(dep => {
      const owner = dep.pull_request_owner;
      if (!devs[owner]) devs[owner] = { name: owner, deploys: 0, repos: new Set(), months: {}, repoCounts: {} };
      const d = devs[owner];
      d.deploys++;
      d.repos.add(dep.repository_name);
      d.repoCounts[dep.repository_name] = (d.repoCounts[dep.repository_name] || 0) + 1;
      const raw = dep.merge_date || dep.inserted_at;
      if (raw) {
        const month = raw.slice(0, 7);
        d.months[month] = (d.months[month] || 0) + 1;
      }
    });
    const result = Object.values(devs).map(d => ({
      name: d.name,
      deploys: d.deploys,
      repoCount: d.repos.size,
      months: Object.keys(d.months).sort().map(m => ({ month: m, count: d.months[m] })),
      repoBreakdown: Object.entries(d.repoCounts).sort((a, b) => b[1] - a[1]).map(([repo, count]) => ({ repo, count })),
    }));
    result.sort((a, b) => b.deploys - a.deploys);
    result.forEach((d, i) => d.rank = i + 1);
    return result;
  }

  // ===== LEAD TIME TAB =====
  let ltPeriod = 'week';

  function calcLeadTimeHours(dep) {
    if (!dep.merge_date || !dep.first_commit_date) return null;
    const merge = new Date(dep.merge_date.replace(' ', 'T'));
    const first = new Date(dep.first_commit_date.replace(' ', 'T'));
    const diffMs = merge - first;
    if (diffMs < 0) return null;
    return diffMs / (1000 * 60 * 60);
  }

  function fmtLeadTime(hours) {
    if (hours < 1) return Math.round(hours * 60) + 'm';
    if (hours < 24) return hours.toFixed(1) + 'h';
    const days = hours / 24;
    return days.toFixed(1) + 'd';
  }

  function filterDeploysForLt() {
    let filtered = DEPLOYS.filter(d => d.merge_date && d.first_commit_date);
    if (filterStart) filtered = filtered.filter(d => d.merge_date.slice(0, 10) >= filterStart);
    if (filterEnd) filtered = filtered.filter(d => d.merge_date.slice(0, 10) <= filterEnd);
    if (filterDev) filtered = filtered.filter(d => d.pull_request_owner === filterDev);
    return filtered;
  }

      : hours[Math.floor(hours.length / 2)];
    const p75 = hours[Math.floor(hours.length * 0.75)];
    const p90 = hours[Math.floor(hours.length * 0.9)];
    const avg = hours.reduce((a, b) => a + b, 0) / hours.length;
    const maxLt = hours[hours.length - 1];

    document.getElementById('ltStats').innerHTML = `
      <div class="card card-accent">
        <div class="stat-label">Total PRs</div>
        <div class="stat-value stat-accent">${withLt.length}</div>

      </div>
      <div class="card">
        <div class="stat-label">Max</div>
        <div class="stat-value">${fmtLeadTime(maxLt)}</div>
      </div>`;

    // Distribution histogram (buckets in hours)
    const bucketEdges = [0, 1, 2, 4, 8, 12, 24, 48, 72, 120, 168, Infinity];
    const bucketLabels = ['<1h', '1-2h', '2-4h', '4-8h', '8-12h', '12-24h', '1-2d', '2-3d', '3-5d', '5-7d', '>7d'];
    const bucketCounts = new Array(bucketLabels.length).fill(0);
    hours.forEach(h => {
      for (let i = 0; i < bucketEdges.length - 1; i++) {
        if (h >= bucketEdges[i] && h < bucketEdges[i + 1]) { bucketCounts[i]++; break; }
      }
    });

    makeChart('chartLtDist', {
      type: 'bar',
      data: {
        labels: bucketLabels,
        datasets: [{

            const ratio = i / (bucketLabels.length - 1);
            return ratio < 0.4 ? 'rgba(59,63,230,0.6)' : ratio < 0.7 ? 'rgba(139,142,245,0.6)' : 'rgba(232,78,163,0.5)';

      timeBuckets[key].push(d.ltHours);

    const ltCurKey = currentPeriodKey(period);
    const timeKeys = Object.keys(timeBuckets).sort().filter(k => k < ltCurKey);

      const s = timeBuckets[k].sort((a, b) => a - b);
      return s[Math.floor(s.length * 0.9)];
    });
    const avgByPeriod = timeKeys.map(k => timeBuckets[k].reduce((a, b) => a + b, 0) / timeBuckets[k].length);
    const volumeByPeriod = timeKeys.map(k => timeBuckets[k].length);
    const timeUnit = period === 'day' ? 'week' : 'month';

    makeChart('chartLtTime', {

          { label: 'PRs', data: volumeByPeriod, type: 'bar', backgroundColor: 'rgba(200,203,224,0.35)', borderColor: 'rgba(200,203,224,0.5)', borderWidth: 1, borderRadius: 2, yAxisID: 'yVol', order: 6 },

        <div><div class="dev-detail-stat-label">P75</div><div class="dev-detail-stat-val">${fmtLeadTime(dev.p75)}</div></div>
        <div><div class="dev-detail-stat-label">P90</div><div class="dev-detail-stat-val" style="color:var(--pink)">${fmtLeadTime(dev.p90)}</div></div>
        <div><div class="dev-detail-stat-label">Avg</div><div class="dev-detail-stat-val">${fmtLeadTime(dev.avg)}</div></div>
        <div><div class="dev-detail-stat-label">Max</div><div class="dev-detail-stat-val">${fmtLeadTime(dev.max)}</div></div>`;

      const devRows = withLt.filter(d => d.pull_request_owner === name);
      const monthBuckets = {};
      devRows.forEach(d => {
        const month = d.merge_date.slice(0, 7);
        if (!monthBuckets[month]) monthBuckets[month] = [];
        monthBuckets[month].push(d.ltHours);
      });
      const months = Object.keys(monthBuckets).sort();
      const medByMonth = months.map(m => {
        const s = monthBuckets[m].sort((a, b) => a - b);
        return s.length % 2 === 0 ? (s[s.length / 2 - 1] + s[s.length / 2]) / 2 : s[Math.floor(s.length / 2)];
      });
      const volByMonth = months.map(m => monthBuckets[m].length);

      makeChart('ltDevChartTime', {
        type: 'bar',
        data: {
          labels: months,
          datasets: [
            { label: 'PRs', data: volByMonth, backgroundColor: 'rgba(200,203,224,0.35)', borderColor: 'rgba(200,203,224,0.5)', borderWidth: 1, borderRadius: 2, yAxisID: 'yVol', order: 2 },
            { label: 'Median', data: medByMonth, type: 'line', borderColor: BLUE, backgroundColor: BLUE_A, borderWidth: 2, fill: true, tension: 0.3, pointRadius: 3, pointHitRadius: 8, yAxisID: 'y', order: 1 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: TICK, font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 14 } },
            tooltip: { ...tooltipOpts, callbacks: { label: ctx => ctx.dataset.yAxisID === 'yVol' ? `PRs: ${ctx.parsed.y}` : `Median: ${fmtLeadTime(ctx.parsed.y)}` } },
          },
          scales: {
            x: { ticks: { color: TICK, font: { family: 'Inter', size: 10 } }, grid: { color: GRID, drawBorder: false } },
            y: scaleY({ position: 'left', title: { display: true, text: 'Hours', color: TICK, font: { family: 'Inter', size: 10 } } }),
            yVol: { position: 'right', beginAtZero: true, ticks: { color: 'rgba(200,203,224,0.8)', font: { family: 'Inter', size: 10 }, precision: 0 }, grid: { drawOnChartArea: false }, title: { display: true, text: 'PRs', color: 'rgba(200,203,224,0.8)', font: { family: 'Inter', size: 10 } } },
          }
        }
      });

      const allHrs = devRows.map(d => d.ltHours);
      const bucketEdges = [0, 1, 2, 4, 8, 12, 24, 48, 72, 120, 168, Infinity];
      const bucketLabels = ['<1h', '1-2h', '2-4h', '4-8h', '8-12h', '12-24h', '1-2d', '2-3d', '3-5d', '5-7d', '>7d'];
      const bucketCounts = new Array(bucketLabels.length).fill(0);
      allHrs.forEach(h => {
        for (let i = 0; i < bucketEdges.length - 1; i++) {
          if (h >= bucketEdges[i] && h < bucketEdges[i + 1]) { bucketCounts[i]++; break; }
        }
      });

      makeChart('ltDevChartDist', {
        type: 'bar',
        data: {
          labels: bucketLabels,
          datasets: [{
            label: 'PRs',
            data: bucketCounts,
            backgroundColor: bucketLabels.map((_, i) => {
              const ratio = i / (bucketLabels.length - 1);
              return ratio < 0.4 ? 'rgba(59,63,230,0.6)' : ratio < 0.7 ? 'rgba(139,142,245,0.6)' : 'rgba(232,78,163,0.5)';
            }),
            borderColor: bucketLabels.map((_, i) => {
              const ratio = i / (bucketLabels.length - 1);
              return ratio < 0.4 ? BLUE : ratio < 0.7 ? '#8B8EF5' : PINK;
            }),
            borderWidth: 1, borderRadius: 3,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { ...tooltipOpts, callbacks: { label: ctx => `${ctx.parsed.y} PRs` } } },
          scales: {
            x: { ticks: { color: TICK, font: { family: 'Inter', size: 10 } }, grid: { display: false } },
            y: scaleY(),
          }
        }
      });

      document.querySelectorAll('#ltTable tbody tr').forEach(tr => {
        tr.classList.toggle('active-row', tr.dataset.dev === name);
      });
    }

    function hideLtDevDetail() {
      ltSelectedDev = null;
      document.getElementById('ltDevDetail').classList.remove('open');
      if (charts.ltDevChartTime) { charts.ltDevChartTime.destroy(); delete charts.ltDevChartTime; }
      if (charts.ltDevChartDist) { charts.ltDevChartDist.destroy(); delete charts.ltDevChartDist; }
      document.querySelectorAll('#ltTable tbody tr').forEach(tr => tr.classList.remove('active-row'));
    }

    document.getElementById('ltDevDetailClose').addEventListener('click', hideLtDevDetail);

    function updateLtTable() {
      const filtered = ltSearchTerm ? devLt.filter(r => r.name.toLowerCase().includes(ltSearchTerm)) : devLt;
      const sorted = [...filtered].sort((a, b) => {
        const av = a[ltSortCol], bv = b[ltSortCol];
        if (typeof av === 'string') return ltSortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
        return ltSortDir === 'asc' ? av - bv : bv - av;
      });
      document.getElementById('ltTblCount').textContent = `(${sorted.length})`;
      document.getElementById('ltTblHead').innerHTML = '<tr>' + LT_COLS.map(c => {
        const active = ltSortCol === c.key;
        const arrow = active ? (ltSortDir === 'asc' ? '&#9650;' : '&#9660;') : '';
        return `<th class="${active ? 'sorted-' + ltSortDir : ''}" data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
      }).join('') + '</tr>';
      document.getElementById('ltTblBody').innerHTML = sorted.map(r =>
        `<tr data-dev="${r.name}" class="${ltSelectedDev === r.name ? 'active-row' : ''}">` +
        LT_COLS.map(c => `<td class="${c.cls}">${c.fmt(r[c.key])}</td>`).join('') + '</tr>'
      ).join('');
      document.querySelectorAll('#ltTable th').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (ltSortCol === col) ltSortDir = ltSortDir === 'asc' ? 'desc' : 'asc';
          else { ltSortCol = col; ltSortDir = col === 'name' ? 'asc' : 'asc'; }
          updateLtTable();
        });
      });
      document.querySelectorAll('#ltTable tbody tr').forEach(tr => {
        tr.addEventListener('click', () => {
          const name = tr.dataset.dev;
          if (ltSelectedDev === name) hideLtDevDetail(); else showLtDevDetail(name);
        });
      });
    }

    document.getElementById('ltTblSearch').addEventListener('input', e => {
      ltSearchTerm = e.target.value.toLowerCase();
      updateLtTable();
    });
    updateLtTable();
  }

  document.querySelectorAll('.lt-period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lt-period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLeadTime(btn.dataset.period);
    });
  });

  // ===== ZENITH TAB =====
  let zenPeriod = 'week';

  function aggregateZenithByPeriod(deploys, period) {
    const buckets = {};
    deploys.forEach(dep => {
      if (!dep.origin_type) return;
      const raw = dep.merge_date || dep.inserted_at;
      if (!raw) return;
      const dateStr = raw.slice(0, 10);
      let key;
      if (period === 'day') key = dateStr;
      else if (period === 'week') key = getWeekStart(dateStr);
      else key = dateStr.slice(0, 7);

      if (!buckets[key]) buckets[key] = { zenith: 0, legacy: 0 };
      if (dep.origin_type === 'zenith') buckets[key].zenith++;
      else buckets[key].legacy++;
    });
    const curKey = currentPeriodKey(period);
    return Object.keys(buckets).sort().filter(k => k < curKey).map(k => ({ period: k, ...buckets[k], total: buckets[k].zenith + buckets[k].legacy }));
  }

  function renderZenith(period) {
    zenPeriod = period;
    const filtered = filterDeploys();
    const tagged = filtered.filter(d => d.origin_type);
    const zenithCount = tagged.filter(d => d.origin_type === 'zenith').length;
    const legacyCount = tagged.filter(d => d.origin_type === 'legacy').length;
    const zenithPct = tagged.length > 0 ? (zenithCount / tagged.length * 100).toFixed(1) : '0';
    const agg = aggregateZenithByPeriod(filtered, period);

    const last4 = agg.slice(-4);
    const prev4 = agg.slice(-8, -4);
    const l4zen = last4.reduce((a, d) => a + d.zenith, 0);
    const p4zen = prev4.reduce((a, d) => a + d.zenith, 0);
    const zenTrend = p4zen > 0 ? ((l4zen - p4zen) / p4zen * 100).toFixed(0) : '—';
    const zenUp = l4zen >= p4zen;

    const zenithRepos = new Set(tagged.filter(d => d.origin_type === 'zenith').map(d => d.repository_name));
    const legacyRepos = new Set(tagged.filter(d => d.origin_type === 'legacy').map(d => d.repository_name));

    document.getElementById('zenithStats').innerHTML = `
      <div class="card">
        <div class="stat-label">Total Deploys</div>
        <div class="stat-value" style="color:var(--gray-900)">${fmtNum(tagged.length)}</div>
      </div>
      <div class="card card-accent">
        <div class="stat-label">Zenith Deploys</div>
        <div class="stat-value stat-accent">${fmtNum(zenithCount)}</div>
        <div class="stat-sub">${zenUp ? '&#9650;' : '&#9660;'} ${zenTrend}% trend</div>
      </div>
      <div class="card">
        <div class="stat-label">Legacy Deploys</div>
        <div class="stat-value stat-accent-pink">${fmtNum(legacyCount)}</div>
      </div>
      <div class="card card-accent">
        <div class="stat-label">Zenith Share</div>
        <div class="stat-value stat-accent">${zenithPct}%</div>
        <div class="stat-sub">of classified deploys</div>
      </div>`;

    const labels = agg.map(a => a.period);
    const timeUnit = period === 'day' ? 'week' : 'month';
    const zenPctData = agg.map(a => a.total > 0 ? (a.zenith / a.total * 100) : null);

    makeChart('chartZenith', {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label: 'Zenith', data: agg.map(a => a.zenith), backgroundColor: 'rgba(59,63,230,0.6)', borderColor: BLUE, borderWidth: 1, borderRadius: 3, stack: 'origin', order: 3 },
          { label: 'Legacy', data: agg.map(a => a.legacy), backgroundColor: 'rgba(232,78,163,0.45)', borderColor: PINK, borderWidth: 1, borderRadius: 3, stack: 'origin', order: 4 },
          { label: 'Zenith %', data: zenPctData, type: 'line', borderColor: BLUE, borderWidth: 2, borderDash: [5, 3], fill: false, tension: 0.3, pointRadius: 0, pointHitRadius: 8, yAxisID: 'yPct', order: 1 },
          { label: 'Zenith % Trend', data: linReg(zenPctData.map(v => v || 0)), type: 'line', borderColor: BLUE, borderWidth: 2, borderDash: [6, 4], fill: false, pointRadius: 0, pointHitRadius: 0, tension: 0, yAxisID: 'yPct', order: 2 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: TICK, font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 14 } },
          tooltip: { ...tooltipOpts, callbacks: { label: ctx => ctx.dataset.yAxisID === 'yPct' ? `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}%` : `${ctx.dataset.label}: ${ctx.parsed.y}` } },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: timeUnit, tooltipFormat: period === 'month' ? 'MMM yyyy' : 'MMM d, yyyy' },
            ticks: { color: TICK, font: { family: 'Inter', size: 10 }, maxRotation: 0 },
            grid: { color: GRID, drawBorder: false },
            stacked: true,
          },
          y: scaleY({ stacked: true, position: 'left', title: { display: true, text: 'Deploys', color: TICK, font: { family: 'Inter', size: 10 } } }),
          yPct: { position: 'right', min: 0, max: 100, ticks: { color: BLUE, font: { family: 'Inter', size: 10 }, callback: v => v + '%' }, grid: { drawOnChartArea: false }, title: { display: true, text: 'Zenith %', color: BLUE, font: { family: 'Inter', size: 10 } } },
        }
      }
    });

    renderZenithDevs(tagged);
  }

  function renderZenithDevs(tagged) {
    const devBuckets = {};
    tagged.forEach(d => {
      const owner = d.pull_request_owner;
      if (!devBuckets[owner]) devBuckets[owner] = { zenith: 0, legacy: 0, months: {}, repos: {} };
      const b = devBuckets[owner];
      if (d.origin_type === 'zenith') b.zenith++; else b.legacy++;
      const mKey = (d.merge_date || d.inserted_at || '').slice(0, 7);
      if (mKey) {
        if (!b.months[mKey]) b.months[mKey] = { zenith: 0, legacy: 0 };
        if (d.origin_type === 'zenith') b.months[mKey].zenith++; else b.months[mKey].legacy++;
      }
      const repo = d.repository_name;
      if (repo) {
        if (!b.repos[repo]) b.repos[repo] = { zenith: 0, legacy: 0 };
        if (d.origin_type === 'zenith') b.repos[repo].zenith++; else b.repos[repo].legacy++;
      }
    });
    const devData = Object.entries(devBuckets).map(([name, d]) => ({
      name,
      total: d.zenith + d.legacy,
      zenith: d.zenith,
      legacy: d.legacy,
      zenithPct: d.zenith + d.legacy > 0 ? Math.round(d.zenith / (d.zenith + d.legacy) * 1000) / 10 : 0,
      months: Object.entries(d.months).sort((a, b) => a[0].localeCompare(b[0])).map(([m, v]) => ({ month: m, ...v })),
      repoBreakdown: Object.entries(d.repos).map(([repo, v]) => ({ repo, zenith: v.zenith, legacy: v.legacy, total: v.zenith + v.legacy })).sort((a, b) => b.total - a.total),
    })).sort((a, b) => b.zenith - a.zenith);

    const ZEN_COLS = [
      { key: 'name', label: 'Developer', fmt: v => v, cls: '' },
      { key: 'total', label: 'Total', fmt: v => v, cls: '' },
      { key: 'zenith', label: 'Zenith', fmt: v => v, cls: 'col-ai' },
      { key: 'legacy', label: 'Legacy', fmt: v => v, cls: 'col-manual' },
      { key: 'zenithPct', label: 'Zenith %', fmt: v => v + '%', cls: 'col-ai col-pct' },
    ];

    const el = document.getElementById('sectionZenithDevs');
    el.innerHTML = `
      <div class="section-title">Developer Detail</div>
      <div class="card" style="padding:20px 24px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <div class="usage-chart-title">All Contributors <span id="zenTblCount" style="font-weight:400;color:var(--gray-500);font-size:13px">(${devData.length})</span></div>
          <input type="text" class="tbl-search" placeholder="Search developer..." id="zenTblSearch">
        </div>
        <div class="tbl-wrap">
          <table class="sort-table" id="zenTable"><thead id="zenTblHead"></thead><tbody id="zenTblBody"></tbody></table>
        </div>
        <div class="dev-detail" id="zenDevDetail">
          <div class="dev-detail-header">
            <div class="dev-detail-name" id="zenDevDetailName"></div>
            <button class="dev-detail-close" id="zenDevDetailClose">Close</button>
          </div>
          <div class="dev-detail-stats" id="zenDevDetailStats"></div>
          <div class="two-col">
            <div class="card" style="padding:16px 20px">
              <div class="usage-chart-header">
                <div class="usage-chart-title">Zenith vs Legacy</div>
                <div class="usage-badge">By Month</div>
              </div>
              <div class="chart-wrap" style="height:260px"><canvas id="zenDevChart"></canvas></div>
            </div>
            <div class="card" style="padding:16px 20px">
              <div class="usage-chart-header">
                <div class="usage-chart-title">Repositories</div>
                <div class="usage-badge">By Repo</div>
              </div>
              <div class="chart-wrap" id="zenDevRepoChartWrap" style="height:260px"><canvas id="zenDevRepoChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>`;

    let zenSortCol = 'zenith', zenSortDir = 'desc', zenSearch = '', zenSelectedDev = null;

    function showZenDevDetail(name) {
      const dev = devData.find(d => d.name === name);
      if (!dev) return;
      zenSelectedDev = name;
      document.getElementById('zenDevDetail').classList.add('open');
      document.getElementById('zenDevDetail').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      document.getElementById('zenDevDetailName').textContent = name;

      document.getElementById('zenDevDetailStats').innerHTML = `
        <div><div class="dev-detail-stat-label">Total</div><div class="dev-detail-stat-val">${dev.total}</div></div>
        <div><div class="dev-detail-stat-label">Zenith</div><div class="dev-detail-stat-val" style="color:var(--blue)">${dev.zenith}</div></div>
        <div><div class="dev-detail-stat-label">Legacy</div><div class="dev-detail-stat-val" style="color:var(--pink)">${dev.legacy}</div></div>
        <div><div class="dev-detail-stat-label">Zenith %</div><div class="dev-detail-stat-val" style="color:var(--blue)">${dev.zenithPct}%</div></div>
        <div><div class="dev-detail-stat-label">Repositories</div><div class="dev-detail-stat-val">${dev.repoBreakdown.length}</div></div>
        <div><div class="dev-detail-stat-label">Active Months</div><div class="dev-detail-stat-val">${dev.months.length}</div></div>`;

      makeChart('zenDevChart', {
        type: 'bar',
        data: {
          labels: dev.months.map(m => m.month),
          datasets: [
            { label: 'Zenith', data: dev.months.map(m => m.zenith), backgroundColor: 'rgba(59,63,230,0.6)', borderColor: BLUE, borderWidth: 1, borderRadius: 3 },
            { label: 'Legacy', data: dev.months.map(m => m.legacy), backgroundColor: PINK_A, borderColor: PINK, borderWidth: 1, borderRadius: 3 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: TICK, font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 14 } }, tooltip: tooltipOpts },
          scales: {
            x: { stacked: true, ticks: { color: TICK, font: { family: 'Inter', size: 10 } }, grid: { color: GRID, drawBorder: false } },
            y: { ...scaleY(), stacked: true }
          }
        }
      });

      const repoH = Math.max(260, dev.repoBreakdown.length * 28 + 40);
      document.getElementById('zenDevRepoChartWrap').style.height = repoH + 'px';

      makeChart('zenDevRepoChart', {
        type: 'bar',
        data: {
          labels: dev.repoBreakdown.map(r => r.repo),
          datasets: [
            { label: 'Zenith', data: dev.repoBreakdown.map(r => r.zenith), backgroundColor: 'rgba(59,63,230,0.6)', borderColor: BLUE, borderWidth: 1, borderRadius: 3 },
            { label: 'Legacy', data: dev.repoBreakdown.map(r => r.legacy), backgroundColor: PINK_A, borderColor: PINK, borderWidth: 1, borderRadius: 3 },
          ]
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: TICK, font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 14 } }, tooltip: tooltipOpts },
          scales: {
            x: { stacked: true, ticks: { color: TICK, font: { family: 'Inter', size: 10 }, precision: 0 }, grid: { color: GRID, drawBorder: false }, beginAtZero: true },
            y: { stacked: true, ticks: { color: TICK, font: { family: 'Inter', size: 10 } }, grid: { display: false } },
          }
        }
      });

      document.querySelectorAll('#zenTable tbody tr').forEach(tr => {
        tr.classList.toggle('active-row', tr.dataset.dev === name);
      });
    }

    function hideZenDevDetail() {
      zenSelectedDev = null;
      document.getElementById('zenDevDetail').classList.remove('open');
      if (charts.zenDevChart) { charts.zenDevChart.destroy(); delete charts.zenDevChart; }
      if (charts.zenDevRepoChart) { charts.zenDevRepoChart.destroy(); delete charts.zenDevRepoChart; }
      document.querySelectorAll('#zenTable tbody tr').forEach(tr => tr.classList.remove('active-row'));
    }

    document.getElementById('zenDevDetailClose').addEventListener('click', hideZenDevDetail);

    function updateZenTable() {
      const filtered = zenSearch ? devData.filter(r => r.name.toLowerCase().includes(zenSearch)) : devData;
      const sorted = [...filtered].sort((a, b) => {
        const av = a[zenSortCol], bv = b[zenSortCol];
        if (typeof av === 'string') return zenSortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
        return zenSortDir === 'asc' ? av - bv : bv - av;
      });
      document.getElementById('zenTblCount').textContent = `(${sorted.length})`;
      document.getElementById('zenTblHead').innerHTML = '<tr>' + ZEN_COLS.map(c => {
        const active = zenSortCol === c.key;
        const arrow = active ? (zenSortDir === 'asc' ? '&#9650;' : '&#9660;') : '';
        return `<th class="${active ? 'sorted-' + zenSortDir : ''}" data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
      }).join('') + '</tr>';
      document.getElementById('zenTblBody').innerHTML = sorted.map(r =>
        `<tr data-dev="${r.name}" class="${zenSelectedDev === r.name ? 'active-row' : ''}">` +
        ZEN_COLS.map(c => `<td class="${c.cls}">${c.fmt(r[c.key])}</td>`).join('') + '</tr>'
      ).join('');
      document.querySelectorAll('#zenTable th').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (zenSortCol === col) zenSortDir = zenSortDir === 'asc' ? 'desc' : 'asc';
          else { zenSortCol = col; zenSortDir = col === 'name' ? 'asc' : 'desc'; }
          updateZenTable();
        });
      });
      document.querySelectorAll('#zenTable tbody tr').forEach(tr => {
        tr.addEventListener('click', () => {
          const name = tr.dataset.dev;
          if (zenSelectedDev === name) hideZenDevDetail(); else showZenDevDetail(name);
        });
      });
    }

    document.getElementById('zenTblSearch').addEventListener('input', e => {
      zenSearch = e.target.value.toLowerCase();
      updateZenTable();
    });
    updateZenTable();
  }

  document.querySelectorAll('.zen-period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.zen-period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderZenith(btn.dataset.period);
    });
  });
})();
</script>
</body>
</html>
